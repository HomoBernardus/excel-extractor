name: 打包 Windows EXE

on: [push] # 当你提交代码时自动触发

# 💡 核心修复：强制让所有 GitHub Actions 组件在 Node.js 24 环境下运行，消除弃用报错
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest # 使用真实的 Windows 系统
    
    steps:
    - name: 复制仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 换成你用的 Python 版本

    - name: 安装依赖库
      run: |
        pip install pandas openpyxl pyinstaller
        # 如果有其他依赖，请在这里继续添加

    - name: 开始打包
      run: |
        pyinstaller -F -w main.py 
        # -F 打包成单文件，-w 隐藏黑色的命令行窗口

    - name: 上传打包好的文件
      uses: actions/upload-artifact@v4
      with:
        name: Windows_Program
        path: dist/main.exe
