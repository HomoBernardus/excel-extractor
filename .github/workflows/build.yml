name: 打包 Windows EXE

on: [push] # 当你提交代码时自动触发

jobs:
  build:
    runs-on: windows-latest # 👈 重点：这里使用的是真实的 Windows 系统
    
    steps:
    - name: 复制仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 换成你用的 Python 版本

    - name: 安装依赖库
      run: |
        pip install pandas openpyxl pyinstaller
        # 如果有其他依赖，在这里继续写

    - name: 开始打包
      run: |
        pyinstaller -F -w main.py 
        # -F 是单文件，-w 是隐藏黑色的命令行窗口（适合GUI）

    - name: 上传打包好的文件
      uses: actions/upload-artifact@v4
      with:
        name: Windows_Program
        path: dist/main.exe
